<!DOCTYPE html>
<html lang="en">
	<head>
		<title>MC Contact by WittyBits Studio</title>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="description" content="Contact the Minecraft server team – Discord, email and social media." />
		<meta property="og:title" content="MC Contact by WittyBits Studio" />
		<meta property="og:description" content="Get in touch with the Minecraft server team." />
		<meta property="og:type" content="website" />
		<meta property="og:image" content="img/logo.png" />
		<link rel="icon" href="img/logo.png" />
		<link href="img/style.css" rel="stylesheet" type="text/css" media="all" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
	</head>
	<body>
		<div id="wb-overlay"></div>
		<main id="wb-page" class="wb-servers-page">
			<div id="wb-logo"><a href="home.html">MC THEME</a></div>
			<section id="contact" aria-labelledby="contact-title">
				<div class="wb-servers-header">
					<h1 id="contact-title">Contact</h1>
					<a class="wb-small-button" href="home.html">Back</a>
				</div>
				<div class="wb-contact-list">
					<div class="wb-contact-card">
						<div class="wb-contact-info">
							<div class="wb-contact-platform">Discord</div>
							<div class="wb-contact-value">discord.gg/example</div>
						</div>
						<a class="wb-small-button" href="https://discord.gg/example" target="_blank" rel="noopener">Join</a>
					</div>
					<div class="wb-contact-card">
						<div class="wb-contact-info">
							<div class="wb-contact-platform">Email</div>
							<div class="wb-contact-value">kontakt@example.pl</div>
						</div>
						<a class="wb-small-button" href="mailto:kontakt@example.pl">Write</a>
					</div>
					<div class="wb-contact-card">
						<div class="wb-contact-info">
							<div class="wb-contact-platform">YouTube</div>
							<div class="wb-contact-value">youtube.com/@example</div>
						</div>
						<a class="wb-small-button" href="https://youtube.com/@example" target="_blank" rel="noopener">Watch</a>
					</div>
					<div class="wb-contact-card">
						<div class="wb-contact-info">
							<div class="wb-contact-platform">TikTok</div>
							<div class="wb-contact-value">tiktok.com/@example</div>
						</div>
						<a class="wb-small-button" href="https://tiktok.com/@example" target="_blank" rel="noopener">Follow</a>
					</div>
					<div class="wb-contact-card">
						<div class="wb-contact-info">
							<div class="wb-contact-platform">Facebook</div>
							<div class="wb-contact-value">facebook.com/example</div>
						</div>
						<a class="wb-small-button" href="https://facebook.com/example" target="_blank" rel="noopener">Like</a>
					</div>
				</div>
			</section>
		</main>
		<div id="wb-footer">&#169; Copyright by <a href="https://wittybits.net/en/open-lab/">WittyBits Studio</a></div>
		<script src="img/js/main.js"></script>
	</body>
</html>
